<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Playground — Project Index</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #c8ff00;
      --accent-dim: rgba(200, 255, 0, 0.08);
      --text: #e8e8f0;
      --muted: #555570;
      --card-hover: #161622;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      padding: 0 24px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,255,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,255,0,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    header {
      padding: 72px 0 56px;
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── Section ── */
    .section-label {
      margin-top: 56px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Project Cards ── */
    .projects {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .project-card {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 22px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .project-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.2s ease;
      border-radius: 0 2px 2px 0;
    }

    .project-card:hover {
      background: var(--card-hover);
      border-color: rgba(200,255,0,0.2);
      transform: translateX(4px);
    }

    .project-card:hover::before {
      transform: scaleY(1);
    }

    .project-index {
      font-size: 11px;
      color: var(--muted);
      min-width: 28px;
      font-variant-numeric: tabular-nums;
    }

    .project-info {
      flex: 1;
    }

    .project-name {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .project-desc {
      font-size: 11px;
      color: var(--muted);
    }

    .project-tag {
      font-size: 10px;
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .arrow {
      color: var(--accent);
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .project-card:hover .arrow {
      opacity: 1;
    }

    /* ── Footer ── */
    footer {
      margin-top: 72px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header       { animation: fadeUp 0.5s ease both; }
    .section-label { animation: fadeUp 0.5s ease 0.15s both; }
    .project-card  { animation: fadeUp 0.5s ease 0.25s both; }
    footer         { animation: fadeUp 0.5s ease 0.35s both; }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <p class="eyebrow">// github playground</p>
      <h1>Project<br/><span>Index</span></h1>
      <p class="subtitle">A collection of practice projects and experiments.<br/>Click any entry to open the project.</p>
    </header>

    <div class="section-label">Published projects</div>

    <div class="projects">

      <a href="./IWConnect-AI-Ideas-Tracker.html" class="project-card">
        <span class="project-index">01</span>
        <div class="project-info">
          <div class="project-name">IWConnect AI Ideas Tracker</div>
          <div class="project-desc">IWConnect-AI-Ideas-Tracker.html</div>
        </div>
        <span class="project-tag">HTML</span>
        <span class="arrow">→</span>
      </a>

    </div>

    <footer>
      <span>playground / index.html</span>
      <span>Add projects above as you publish them</span>
    </footer>

  </div>
</body>
</html>
